<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>JARVIS</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  #bg { position: fixed; inset: 0; opacity: 0; transition: opacity .4s;
        background: radial-gradient(ellipse at center, #0c1a26 0%, #060d16 60%, #02060c 100%); }
  canvas { position: fixed; inset: 0; display: block; }
  /* Korean subtitle of what JARVIS is saying — under the orb. */
  #subtitle {
    position: fixed; left: 50%; bottom: 8vh; transform: translateX(-50%);
    max-width: 80vw; text-align: center; opacity: 0;
    transition: opacity .25s; pointer-events: none;
    word-break: keep-all; overflow-wrap: break-word; line-break: strict; white-space: normal;
  }
  #subtext {
    color: #f6fcff;
    font: 600 clamp(16px, 2.2vw, 28px)/1.7 -apple-system, "Apple SD Gothic Neo",
          "Malgun Gothic", "Noto Sans KR", "Segoe UI", sans-serif;
    background: rgba(0,0,0,.62);
    padding: .15em .55em; border-radius: 7px;
    box-decoration-break: clone; -webkit-box-decoration-break: clone;
    text-shadow: 0 1px 6px rgba(0,0,0,.9); letter-spacing: .01em;
  }
  @keyframes nblink { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* 화면 헤더(영화 코너 프레임) — 'J.A.R.V.I.S' 라벨은 이름 치환 대상이라 그대로 유지. */
  #jhead { position: fixed; top: 16px; left: 18px; z-index: 6; pointer-events: none;
    font: 700 10px/1 ui-monospace, "SF Mono", "Menlo", monospace; letter-spacing: .3em;
    color: #7fe9ff; text-shadow: 0 0 10px rgba(94,224,255,.6); opacity: .7; }

  /* 영상 오브 레이어 — 알파가 박힌 mp4/webm/mov(검정 이미 빠짐) + 음성 반응 글로우/코어. */
  #orbwrap{position:fixed;right:5vw;bottom:9vh;width:200px;height:200px;
    transition:opacity .4s ease, width .4s cubic-bezier(.2,.7,.2,1), height .4s cubic-bezier(.2,.7,.2,1),
               right .4s cubic-bezier(.2,.7,.2,1), bottom .4s cubic-bezier(.2,.7,.2,1);
    pointer-events:none;z-index:5;display:flex;align-items:center;justify-content:center;opacity:0}
  #orbwrap.present{opacity:1}
  #orbwrap.expand{right:50%;bottom:50%;transform:translate(50%,50%);width:44vh;height:44vh}
  #orbvid{width:100%;height:100%;object-fit:contain;
    transform:scale(var(--orbscale,1));
    filter:brightness(var(--orbbright,1))}
  #orbglow{position:absolute;width:160%;height:160%;border-radius:50%;
    background:radial-gradient(circle,rgba(255,180,70,var(--glow,0)) 0%,rgba(255,120,30,calc(var(--glow,0)*.4)) 45%,transparent 70%)}
  #orbcore{position:absolute;width:32%;height:32%;border-radius:50%;
    background:radial-gradient(circle,rgba(255,240,200,var(--core,0)),transparent 70%)}

  /* 작업실 패널(시안 홀로그램). 배치는 JS가 모드별 좌표/클래스로 제어(코너 스택/중앙 방사). */
  #workshop{position:fixed;inset:0;pointer-events:none;z-index:5}
  #panels{position:fixed;inset:0;pointer-events:none;z-index:6}
  .pnl{position:absolute;background:rgba(0,8,14,.85);
    border:1px solid rgba(94,224,255,.6);border-radius:3px;
    padding:.55rem .7rem;max-width:min(34vw,420px);
    color:#d8f6ff;opacity:0;transform:translateY(6px) scale(.98);
    transition:opacity .35s ease, transform .35s cubic-bezier(.2,.7,.2,1), left .4s ease, top .4s ease;
    box-shadow:0 0 0 1px rgba(94,224,255,.1),0 0 20px rgba(94,224,255,.22),0 10px 30px rgba(0,0,0,.55),inset 0 0 26px rgba(94,224,255,.07);
    text-shadow:0 0 8px rgba(94,224,255,.4);
    clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));
    font:500 13px/1.5 ui-monospace,"SF Mono","Menlo","Malgun Gothic","Apple SD Gothic Neo",monospace}
  .pnl.show{opacity:1;transform:translateY(0) scale(1)}
  .pnl .h{font:700 10px/1 ui-monospace,"SF Mono",monospace;letter-spacing:.24em;
    color:#7fe9ff;text-transform:uppercase;margin-bottom:.4rem;display:flex;align-items:center;gap:.4rem;
    text-shadow:0 0 9px rgba(94,224,255,.6)}
  .pnl .h::before{content:"";width:6px;height:6px;border-radius:50%;background:#7fe9ff;
    box-shadow:0 0 9px #7fe9ff;animation:nblink 1.6s ease-in-out infinite;flex:0 0 auto}
  .pnl .b{white-space:pre-wrap;word-break:keep-all}
  .pnl.warn{border-color:rgba(255,176,46,.65)} .pnl.warn .h{color:#ffc55e}
  .pnl.warn .h::before{background:#ffc55e;box-shadow:0 0 9px #ffc55e}
  .pnl.gold{border-color:rgba(236,186,79,.6)} .pnl.gold .h{color:#ecba4f}
  .pnl.gold .h::before{background:#ecba4f;box-shadow:0 0 9px #ecba4f}
  .pnl::before{content:"";position:absolute;top:-1px;left:-1px;width:13px;height:13px;
    border-top:2px solid #6fe6ff;border-left:2px solid #6fe6ff;opacity:.85}
  .pnl.big{font-size:14px} .pnl.huge{font-size:15.5px;max-width:min(46vw,560px)}

  /* 하단 5게이지 스트립(영화 HUD 하단 위젯) — 중앙 작업실 모드에서만. */
  #gaugestrip{position:fixed;left:50%;bottom:4vh;transform:translateX(-50%);display:none;
    gap:20px;z-index:6;pointer-events:none}
  body.bmode #gaugestrip{display:flex}
  .g{display:flex;flex-direction:column;align-items:center;gap:3px;
    font:700 8px ui-monospace,monospace;letter-spacing:.12em;color:#7fe9ff;opacity:.82}
  .g svg{width:22px;height:22px}
</style>
</head>
<body>
  <div id="bg"></div>
  <canvas id="hud"></canvas>
  <div id="jhead">J.A.R.V.I.S</div>
  <div id="orbwrap">
    <div id="orbglow"></div>
    <video id="orbvid" autoplay loop muted playsinline></video>
    <div id="orbcore"></div>
  </div>
  <svg id="workshop" width="0" height="0"></svg>
  <div id="panels"></div>
  <div id="gaugestrip"></div>
  <div id="subtitle"><span id="subtext"></span></div>
<script>
// 알파 영상 소스: WebKit(WKWebView)=HEVC-alpha .mov, Chromium(WebView2)=VP9-alpha .webm.
// (WebKit은 .webm 알파 미지원, Chromium은 .mov HEVC-alpha 미지원 — UA로 확정 분기.)
(function(){
  var v=document.getElementById("orbvid"), ua=navigator.userAgent;
  var isWebKit=/AppleWebKit/.test(ua) && !/Chrome|Chromium|Edg|CriOS/.test(ua);
  v.src=isWebKit ? "/assets/orb-alpha.mov" : "/assets/orb-alpha.webm";
  if(v.play) v.play().catch(function(){});
})();

const cv=document.getElementById("hud"), ctx=cv.getContext("2d");
let W=0,H=0,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight;
  cv.width=W*DPR; cv.height=H*DPR; cv.style.width=W+"px"; cv.style.height=H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0); }
addEventListener("resize",resize); resize();

const PRES={idle:0.0,attentive:0.35,listening:0.6,thinking:0.78,speaking:1.0};
let state="idle",targetLevel=0,level=0,presence=0,demo=true,_pt=0;

const subEl=document.getElementById("subtitle");
const subTextEl=document.getElementById("subtext");
const orbwrap=document.getElementById("orbwrap");
const panelsEl=document.getElementById("panels");
const workshopEl=document.getElementById("workshop");
const stripEl=document.getElementById("gaugestrip");
const SVGNS="http://www.w3.org/2000/svg";
let panelKeepUntil=0, panelEls={};

// 영상 오브 반응: presence로 등장(present)·level로 스케일/글로우/코어/밝기.
function reactOrb(){
  orbwrap.classList.toggle("present", presence>0.02);
  const lv=level;
  orbwrap.style.setProperty("--orbscale",(1+0.20*lv).toFixed(3));
  orbwrap.style.setProperty("--glow",(0.12+0.5*lv).toFixed(3));
  orbwrap.style.setProperty("--core",(0.15+0.55*lv).toFixed(3));
  orbwrap.style.setProperty("--orbbright",(1+0.10*lv).toFixed(3));
}
// A↔B 전환: expand면 오브가 중앙으로 커지고 body에 bmode가 붙는다(패널 재배치 트리거).
function setExpand(on){
  const was=document.body.classList.contains("bmode");
  orbwrap.classList.toggle("expand", on);
  document.body.classList.toggle("bmode", on);
  return was!==on;
}
function apply(s,l,text){ state=s in PRES?s:"idle"; targetLevel=l||0; demo=false;
  if(text!==undefined){ subTextEl.textContent=text||""; subEl.style.opacity=text?1:0; } }

// ----- 패널 렌더 (키 기반 재조정 — 텔레메트리 2s 갱신에도 깜빡임 없음) -----
function sizeClass(p){const len=(p.body||"").length+(p.title||"").length;
  if(len>360) return "huge"; if(len>120) return "big"; return "";}

function slotsFor(n,bmode){
  if(!bmode){const s=[];for(let i=0;i<n;i++)s.push({right:"4vw",bottom:(16+i*15)+"vh"});return s;}
  const ring=[
    {left:"3vw", top:"16vh", cx:18, cy:24},
    {right:"3vw",top:"14vh", cx:80, cy:22},
    {right:"3vw",top:"46vh", cx:82, cy:52},
    {right:"4vw",top:"73vh", cx:78, cy:74},
    {left:"4vw", top:"72vh", cx:20, cy:74},
    {left:"3vw", top:"45vh", cx:16, cy:50}];
  return ring.slice(0,n);
}

function renderPanels(panels){
  panels=panels||[]; const bmode=document.body.classList.contains("bmode");
  // 중앙모드: 패널=두뇌만(텔레메트리는 하단 게이지 스트립). 코너모드: 두뇌 + 최소 텔레메트리(시계/작업).
  const list = bmode
    ? panels.filter(p=>p.kind==="brain")
    : panels.filter(p=>p.kind==="brain" || p.id==="clock" || p.id==="tasks");
  const slots=slotsFor(list.length,bmode), seen={};
  list.forEach((p,i)=>{
    const key=p.kind+":"+(p.id||p.title||i); seen[key]=1;
    let el=panelEls[key], isNew=!el;
    if(isNew){ el=document.createElement("div"); el.innerHTML='<div class="h"></div><div class="b"></div>';
      panelsEl.appendChild(el); panelEls[key]=el; }
    const tone=p.tone==="warn"?"warn":p.tone==="gold"?"gold":"";
    const cls="pnl "+tone+" "+sizeClass(p);
    if(isNew){ el.className=cls; requestAnimationFrame(()=>el.classList.add("show")); }
    else { el.className=cls+" show"; }
    el.querySelector(".h").textContent=p.title||"";
    el.querySelector(".b").textContent=p.body||"";
    el.style.left=el.style.top=el.style.right=el.style.bottom="";
    const s=slots[i]||{}; ["left","top","right","bottom"].forEach(k=>{ if(s[k]) el.style[k]=s[k]; });
  });
  for(const key in panelEls){ if(!seen[key]){ panelEls[key].remove(); delete panelEls[key]; } }
  // 작업실 장식(매 렌더 새로 그림 — 트랜지션 없어 깜빡임 없음)
  clearWorkshop();
  if(list.length || (bmode && panels.length)){
    drawOrbRings(bmode);
    if(bmode) list.forEach((p,i)=>{ const s=slots[i]; if(s&&s.cx!=null) drawLeader(s.cx,s.cy); });
  }
  renderStrip(panels,bmode);
  if(panels.length) panelKeepUntil=performance.now()+Math.min(45000,8000+JSON.stringify(panels).length*30);
}

function clearWorkshop(){ while(workshopEl.firstChild) workshopEl.removeChild(workshopEl.firstChild);
  workshopEl.setAttribute("width",innerWidth); workshopEl.setAttribute("height",innerHeight);
  workshopEl.setAttribute("viewBox","0 0 "+innerWidth+" "+innerHeight); }
function svgEl(tag,attrs){const e=document.createElementNS(SVGNS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]); workshopEl.appendChild(e); return e;}
function orbCenter(){const r=orbwrap.getBoundingClientRect(); return [r.left+r.width/2, r.top+r.height/2, r.width/2];}
function drawLeader(cxvw,cyvh){const c=orbCenter(), px=innerWidth*cxvw/100, py=innerHeight*cyvh/100, mx=(c[0]+px)/2;
  svgEl("line",{x1:c[0],y1:c[1],x2:mx,y2:py,stroke:"rgba(94,224,255,.4)","stroke-width":1});
  svgEl("line",{x1:mx,y1:py,x2:px,y2:py,stroke:"rgba(94,224,255,.4)","stroke-width":1});
  svgEl("circle",{cx:px,cy:py,r:2,fill:"#67C7EB"});}
function drawOrbRings(bmode){const c=orbCenter(), b=c[2];
  if(!bmode){ svgEl("circle",{cx:c[0],cy:c[1],r:b+9,fill:"none",stroke:"rgba(94,224,255,.18)","stroke-width":1}); return; }
  svgEl("circle",{cx:c[0],cy:c[1],r:b+14,fill:"none",stroke:"rgba(94,224,255,.2)","stroke-width":1});
  svgEl("circle",{cx:c[0],cy:c[1],r:b+24,fill:"none",stroke:"rgba(94,224,255,.28)","stroke-width":1,"stroke-dasharray":"5 9"});
  svgEl("circle",{cx:c[0],cy:c[1],r:b+36,fill:"none",stroke:"rgba(236,186,79,.5)","stroke-width":1.5,
    "stroke-dasharray":(2*Math.PI*(b+36)*0.3).toFixed(0)+" "+(2*Math.PI*(b+36)).toFixed(0),"stroke-linecap":"round"});
}

const STRIP_LABELS={clock:"시계",mic:"입력",sys:"부하",tasks:"작업",net:"NET"};
function fracFor(p){ if(p.gauge&&p.gauge.cpu!=null) return p.gauge.cpu/100;
  if(p.id==="mic") return /●|LIVE/.test(p.body||"")?1:0.12;
  if(p.id==="net") return /✓/.test(p.body||"")?1:0.1;
  if(p.id==="tasks"){const m=(p.body||"").match(/\d+/);return m?Math.min(m[0]/5,1):0.2;}
  return 0.6; }
function gaugeSVG(frac,gold){const r=9,c=2*Math.PI*r;
  return '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="none" stroke="#1d3a44" stroke-width="2.5"/>'+
    '<circle cx="12" cy="12" r="9" fill="none" stroke="'+(gold?"#ecba4f":"#8effc8")+'" stroke-width="2.5" '+
    'stroke-linecap="round" stroke-dasharray="'+(c*Math.max(0.04,Math.min(1,frac))).toFixed(1)+' '+c.toFixed(1)+'" '+
    'transform="rotate(-90 12 12)"/></svg>';}
function renderStrip(panels,bmode){ stripEl.innerHTML=""; if(!bmode) return;
  panels.filter(p=>p.kind==="telemetry").forEach(p=>{const g=document.createElement("div"); g.className="g";
    g.innerHTML=gaugeSVG(fracFor(p), p.tone==="gold")+'<span>'+(STRIP_LABELS[p.id]||p.id||"")+'</span>';
    stripEl.appendChild(g);});
}

try{ const es=new EventSource("/events");
  es.onmessage=e=>{const d=JSON.parse(e.data);apply(d.state,d.level,d.text);
    setExpand(!!d.expand || (d.panels && d.panels.some(p=>p.kind==="brain")));
    renderPanels(d.panels);};
  es.onerror=()=>{ state="idle"; targetLevel=0; demo=false; subEl.style.opacity=0; renderPanels([]); };
}catch(_){}

function frame(){
  const t=performance.now()/1000;
  if(demo){ state="speaking"; targetLevel=0.4+0.5*Math.abs(Math.sin(t*2.4))*Math.abs(Math.sin(t*5.3)); }
  level+=(targetLevel-level)*(targetLevel>level?0.45:0.12);
  presence+=((PRES[state]??0)-presence)*0.07;
  document.getElementById("bg").style.opacity = demo?0:"";
  ctx.clearRect(0,0,W,H);    // 캔버스는 투명 유지(레거시 — 현재 미사용).
  reactOrb();
  // 패널 표시 시간(keepUntil) 지나면 비운다(패널이 있을 때만).
  if(performance.now()>panelKeepUntil && Object.keys(panelEls).length) renderPanels([]);
  if(presence<0.01){ setTimeout(()=>requestAnimationFrame(frame),250); return; }  // 대기 중 절전
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
