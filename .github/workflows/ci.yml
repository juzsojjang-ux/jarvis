# 자비스 CI — 맥+윈도우 양쪽에서 테스트하고, 양쪽 배포물을 자동 빌드한다.
#
# 목적: "윈도우에서 한 번도 안 돌려봐서 터지는" 부류의 버그를 사용자가 아니라
# CI가 먼저 잡는다. 빌드 잡은 테스트와 독립이라 테스트가 빨간불이어도
# 배포물(JARVIS.exe / JARVIS.app)은 항상 생성된다(Actions 탭 → Artifacts).
#
# 대형 음성 모델(jarvis.onnx 등 4종, ~660MB)은 git이 아니라 GitHub Release
# `voice-models-v1` 자산에 있다 — 빌드 잡이 gh로 내려받는다.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']          # v2.0.0 같은 버전 태그 푸시 → 그 태그로 버전 릴리스 생성
  workflow_dispatch:

jobs:
  test:
    name: 테스트 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud,hud]"
      - name: pytest
        run: python -m pytest -q

  build-windows:
    name: 윈도우 EXE 빌드
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud,hud]" "pyinstaller>=6.0"
      - name: 음성 모델 받기 (Release 자산)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download voice-models-v1 --dir voice_models --skip-existing
      - name: PyInstaller 빌드
        run: pyinstaller packaging/jarvis.spec --noconfirm
      - name: 압축
        run: Compress-Archive -Path dist/JARVIS -DestinationPath JARVIS-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-windows
          path: JARVIS-windows.zip
          retention-days: 14

  build-macos:
    name: 맥 .app 빌드
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud,hud]" "pyinstaller>=6.0"
      - name: 음성 모델 받기 (Release 자산)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download voice-models-v1 --dir voice_models --skip-existing
      - name: PyInstaller 빌드
        run: pyinstaller packaging/jarvis.spec --noconfirm
      - name: 압축 (.app)
        run: ditto -c -k --keepParent dist/JARVIS.app JARVIS-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-mac
          path: JARVIS-mac.zip
          retention-days: 14

  release:
    name: 설치파일 릴리스
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 릴리스 생성/자산 업로드 권한
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist            # dist/JARVIS-windows/…, dist/JARVIS-mac/…
      - name: 설치파일 첨부 (main→롤링 latest / 태그→버전 릴리스)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}      # 체크아웃이 없어 -R로 저장소를 명시
        run: |
          win=dist/JARVIS-windows/JARVIS-windows.zip
          mac=dist/JARVIS-mac/JARVIS-mac.zip
          base="- JARVIS-windows.zip : 윈도우용 (압축 풀고 JARVIS.exe 실행)\n- JARVIS-mac.zip : 맥용 (압축 풀고 JARVIS.app 실행)\n\n⚠️ 맥(미서명 앱) 첫 실행 — Gatekeeper 차단 해제(1회):\n압축 푼 폴더에서 터미널로 다음 실행 후 JARVIS.app 더블클릭\n    xattr -dr com.apple.quarantine JARVIS.app\n첫 실행 후 '시스템 설정 → 개인정보 보호 및 보안'에서 마이크·손쉬운 사용(Accessibility) 권한을 허용해야 음성·단축키가 동작합니다. (Apple Silicon 전용 빌드)"
          publish() {  # $1=tag  $2=title  $3=notes
            if gh release view "$1" -R "$REPO" >/dev/null 2>&1; then
              gh release upload "$1" "$win" "$mac" --clobber -R "$REPO"
              printf "%b" "$3" | gh release edit "$1" --title "$2" --notes-file - -R "$REPO"
            else
              printf "%b" "$3" | gh release create "$1" "$win" "$mac" --title "$2" --notes-file - -R "$REPO"
            fi
          }
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ver="$GITHUB_REF_NAME"
            publish "$ver" "자비스 $ver" "자비스 $ver 릴리스.\n\n$base\n\n커밋 ${GITHUB_SHA}"
          else
            publish latest "최신 자비스 설치파일" "main 푸시마다 자동 갱신되는 최신 자비스 설치파일입니다.\n\n$base\n\n커밋 ${GITHUB_SHA}"
          fi
