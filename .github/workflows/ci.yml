# 자비스 CI — 맥+윈도우 양쪽에서 테스트하고, 양쪽 배포물을 자동 빌드한다.
#
# 목적: "윈도우에서 한 번도 안 돌려봐서 터지는" 부류의 버그를 사용자가 아니라
# CI가 먼저 잡는다. 빌드 잡은 테스트와 독립이라 테스트가 빨간불이어도
# 배포물(JARVIS.exe / JARVIS.app)은 항상 생성된다(Actions 탭 → Artifacts).
#
# 대형 음성 모델(jarvis.onnx 등 4종, ~660MB)은 git이 아니라 GitHub Release
# `voice-models-v1` 자산에 있다 — 빌드 잡이 gh로 내려받는다.

name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 테스트 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud]"
      - name: pytest
        run: python -m pytest -q

  build-windows:
    name: 윈도우 EXE 빌드
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud]" "pyinstaller>=6.0"
      - name: 음성 모델 받기 (Release 자산)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download voice-models-v1 --dir voice_models --skip-existing
      - name: PyInstaller 빌드
        run: pyinstaller packaging/jarvis.spec --noconfirm
      - name: 압축
        run: Compress-Archive -Path dist/JARVIS -DestinationPath JARVIS-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-windows
          path: JARVIS-windows.zip
          retention-days: 14

  build-macos:
    name: 맥 .app 빌드
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud]" "pyinstaller>=6.0"
      - name: 음성 모델 받기 (Release 자산)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download voice-models-v1 --dir voice_models --skip-existing
      - name: PyInstaller 빌드
        run: pyinstaller packaging/jarvis.spec --noconfirm
      - name: 압축 (.app)
        run: ditto -c -k --keepParent dist/JARVIS.app JARVIS-mac.zip
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-mac
          path: JARVIS-mac.zip
          retention-days: 14

  release:
    name: 최신 설치파일 릴리스
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 릴리스 생성/자산 업로드 권한
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist            # dist/JARVIS-windows/…, dist/JARVIS-mac/…
      - name: 롤링 'latest' 릴리스에 설치파일 첨부
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}      # 체크아웃이 없어 -R로 저장소를 명시
        run: |
          win=dist/JARVIS-windows/JARVIS-windows.zip
          mac=dist/JARVIS-mac/JARVIS-mac.zip
          notes="main 푸시마다 자동 갱신되는 최신 자비스 설치파일입니다.\n\n- JARVIS-windows.zip : 윈도우용 (압축 풀고 JARVIS.exe 실행)\n- JARVIS-mac.zip : 맥용 (압축 풀고 JARVIS.app 실행)\n\n커밋 ${GITHUB_SHA}"
          if gh release view latest -R "$REPO" >/dev/null 2>&1; then
            gh release upload latest "$win" "$mac" --clobber -R "$REPO"
            printf "%b" "$notes" | gh release edit latest --notes-file - -R "$REPO"
          else
            printf "%b" "$notes" | gh release create latest "$win" "$mac" \
              --title "최신 자비스 설치파일" --notes-file - -R "$REPO"
          fi
