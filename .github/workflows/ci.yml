# 자비스 CI — 맥+윈도우 양쪽에서 테스트하고, 양쪽 배포물을 자동 빌드한다.
#
# 목적: "윈도우에서 한 번도 안 돌려봐서 터지는" 부류의 버그를 사용자가 아니라
# CI가 먼저 잡는다. 빌드 잡은 테스트와 독립이라 테스트가 빨간불이어도
# 배포물(JARVIS.exe / JARVIS.app)은 항상 생성된다(Actions 탭 → Artifacts).
#
# 대형 음성 모델(jarvis.onnx 등 4종, ~660MB)은 git이 아니라 GitHub Release
# `voice-models-v1` 자산에 있다 — 빌드 잡이 gh로 내려받는다.

name: CI

on:
  push:
    branches: [main]
    tags: ['v*']          # v2.0.0 같은 버전 태그 푸시 → 그 태그로 버전 릴리스 생성
  workflow_dispatch:

jobs:
  test:
    name: 테스트 (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud,hud]"
      - name: pytest
        run: python -m pytest -q

  build-windows:
    name: 윈도우 EXE 빌드
    runs-on: windows-latest
    env:
      JARVIS_BUNDLE_POCKET: "1"      # 윈도우도 Pocket(torch CPU) 무설치 번들
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud,hud]" "pyinstaller>=6.0"
      - name: Pocket(torch CPU) 빌드 의존성 설치
        # 윈도우 torch는 CPU 휠로 고정(CUDA 휠 유입 차단 — 용량/불필요). PyInstaller
        # Analysis가 추적하려면 빌드 venv에 반드시 설치돼 있어야 한다.
        run: pip install "pocket-tts[audio]" "torch>=2.5" --extra-index-url https://download.pytorch.org/whl/cpu
      - name: 음성 모델 받기 (Release 자산)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download voice-models-v1 --dir voice_models --skip-existing
      - name: Pocket 음색 가중치 받기·전개 (심볼릭→실파일, 윈도우 안전)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download voice-weights --pattern 'pocket-voice-weights.tar.gz' --dir /tmp/pkw --skip-existing
          python packaging/extract_hf_tar.py /tmp/pkw/pocket-voice-weights.tar.gz voice_models/pocket_hf
          test -d "voice_models/pocket_hf/hub/models--kyutai--pocket-tts" \
            || { echo '가중치 레이아웃 불일치(hub/models--kyutai--pocket-tts 없음)'; exit 1; }
      - name: 디스크 여유 (pip 캐시 정리)
        run: pip cache purge
      - name: PyInstaller 빌드
        run: pyinstaller packaging/jarvis.spec --noconfirm
      - name: Pocket 스모크 게이트 (무음 빌드 차단)
        # 빌드된 .exe에서 실제 1발화 합성을 돌려본다. 실패 시 잡 실패 → 깨진 빌드 미배포.
        run: |
          & dist\JARVIS\JARVIS.exe --pocket-smoke
          if ($LASTEXITCODE -ne 0) { Write-Error "POCKET-SMOKE 실패 (exit $LASTEXITCODE)"; exit 1 }
      - name: 압축 (7z — 대용량 안정)
        # Compress-Archive는 2GB+ 디렉토리에서 불안정/느림 → 러너 내장 7z 사용.
        run: 7z a -tzip -mx=5 JARVIS-windows.zip .\dist\JARVIS\* | Out-Null
      - name: 디스크 정리 (압축 후 dist/build 제거)
        run: Remove-Item -Recurse -Force dist,build -ErrorAction SilentlyContinue
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-windows
          path: JARVIS-windows.zip
          retention-days: 14

  build-macos:
    name: 맥 .app 빌드
    runs-on: macos-latest
    env:
      JARVIS_BUNDLE_POCKET: "1"      # 맥은 Pocket(torch) 무설치 번들 (spec이 이 토글을 본다)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,winhud,hud]" "pyinstaller>=6.0"
      - name: Pocket(torch) 빌드 의존성 설치
        # PyInstaller Analysis는 '빌드 머신 메인 venv'에서 import해 추적한다 — 여기 없으면
        # spec의 find_spec('pocket_tts') 분기가 스킵돼 조용히 무음 번들이 나간다.
        run: pip install "pocket-tts[audio]" "torch>=2.5"
      - name: 음성 모델 받기 (Release 자산)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download voice-models-v1 --dir voice_models --skip-existing
      - name: Pocket 음색 가중치 받기·전개 (심볼릭→실파일, 양 플랫폼 동일)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download voice-weights --pattern 'pocket-voice-weights.tar.gz' --dir /tmp/pkw --skip-existing
          python packaging/extract_hf_tar.py /tmp/pkw/pocket-voice-weights.tar.gz voice_models/pocket_hf
          test -d "voice_models/pocket_hf/hub/models--kyutai--pocket-tts" \
            || { echo '가중치 레이아웃 불일치(hub/models--kyutai--pocket-tts 없음)'; exit 1; }
      - name: PyInstaller 빌드
        run: pyinstaller packaging/jarvis.spec --noconfirm
      - name: Pocket 스모크 게이트 (무음 빌드 차단)
        # 빌드된 .app에서 실제 1발화 합성(torch import + 오프라인 가중치 로드)을 돌려본다.
        # 실패하면 여기서 잡 실패 → 깨진/무음 빌드가 릴리스로 안 나간다.
        run: ./dist/JARVIS.app/Contents/MacOS/JARVIS --pocket-smoke
      - name: 압축 (.app)
        run: ditto -c -k --keepParent dist/JARVIS.app JARVIS-mac.zip
      - name: 디스크 정리 (압축 후 dist/build 제거 — 러너 디스크 여유)
        run: rm -rf dist build || true
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-mac
          path: JARVIS-mac.zip
          retention-days: 14

  release:
    name: 설치파일 릴리스
    needs: [build-windows, build-macos]
    # workflow_dispatch(브랜치 검증 빌드)에서는 릴리스를 올리지 않는다 — 'latest' 오염 방지.
    # main 푸시/태그 푸시일 때만 게시. 검증은 빌드 잡의 스모크 게이트 + Artifacts로.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write          # 릴리스 생성/자산 업로드 권한
    steps:
      - uses: actions/checkout@v4          # 제거 프로그램(packaging/자비스-제거.*)을 릴리스 자산으로 첨부하려고 체크아웃
      - uses: actions/download-artifact@v4
        with:
          path: dist            # dist/JARVIS-windows/…, dist/JARVIS-mac/…
      - name: 설치파일 첨부 (main→롤링 latest / 태그→버전 릴리스)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}      # 체크아웃이 없어 -R로 저장소를 명시
        run: |
          win=dist/JARVIS-windows/JARVIS-windows.zip
          mac=dist/JARVIS-mac/JARVIS-mac.zip
          rmmac="packaging/자비스-제거.command"   # 맥 제거 프로그램(체크아웃으로 확보)
          rmwin="packaging/자비스-제거.bat"        # 윈도우 제거 프로그램
          base="- JARVIS-windows.zip : 윈도우용 (압축 풀고 JARVIS.exe 실행)\n- JARVIS-mac.zip : 맥용 (압축 풀고 JARVIS.app 실행)\n- 자비스-제거.command : 맥 제거 프로그램 (더블클릭 → y. 앱·데이터·권한 정리, 개발 소스는 보존)\n- 자비스-제거.bat : 윈도우 제거 프로그램\n\n⚠️ 맥(미서명 앱) 첫 실행 — Gatekeeper 차단 해제(1회):\n압축 푼 폴더에서 터미널로 다음 실행 후 JARVIS.app 더블클릭\n    xattr -dr com.apple.quarantine JARVIS.app\n첫 실행 후 '시스템 설정 → 개인정보 보호 및 보안'에서 마이크·손쉬운 사용(Accessibility) 권한을 허용해야 음성·단축키가 동작합니다. (Apple Silicon 전용 빌드)"
          publish() {  # $1=tag  $2=title  $3=notes
            if gh release view "$1" -R "$REPO" >/dev/null 2>&1; then
              gh release upload "$1" "$win" "$mac" "$rmmac" "$rmwin" --clobber -R "$REPO"
              printf "%b" "$3" | gh release edit "$1" --title "$2" --notes-file - -R "$REPO"
            else
              printf "%b" "$3" | gh release create "$1" "$win" "$mac" "$rmmac" "$rmwin" --title "$2" --notes-file - -R "$REPO"
            fi
          }
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            ver="$GITHUB_REF_NAME"
            publish "$ver" "자비스 $ver" "자비스 $ver 릴리스.\n\n$base\n\n커밋 ${GITHUB_SHA}"
          else
            publish latest "최신 자비스 설치파일" "main 푸시마다 자동 갱신되는 최신 자비스 설치파일입니다.\n\n$base\n\n커밋 ${GITHUB_SHA}"
          fi
